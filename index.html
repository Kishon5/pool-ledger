<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#060709">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pool Ledger">
<title>Pool Ledger</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23060709'/%3E%3Cpath d='M12 42 26 30l8 7 18-19' stroke='%234ADE80' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  /* ============ DESIGN TOKENS ============
     Two independent axes: data-palette (carbon|navy|spruce|violet)
     and data-theme (dark|light). Money colours (gain/loss/brass) stay
     semantically constant across every palette — only the chrome changes.
     Type system: Space Grotesk (display numbers + headings) over Inter
     (UI/body — proven tabular figures for money columns). */
  :root{
    --font:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --display:'Space Grotesk','Inter',system-ui,sans-serif;
  }

  /* ---- Carbon (default) — neutral graphite, money is the only saturated colour */
  :root, html[data-theme=light]{
    --paper:#F4F5F7; --panel:#FFFFFF; --panel2:#EDEEF1; --ink:#16181B; --soft:#5F646B;
    --line:#DEE0E4; --line2:#EAECEF; --gain:#127A47; --loss:#C0392B; --brass:#8A6D24;
    --accent:#127A47; --accent-ink:#FFFFFF;
    --warnbg:#FCF4E6; --warn:#8A5D12; --chip:#E7E9ED; --danger-bg:#FBEBE9;
    --shadow:0 1px 2px rgba(16,18,20,.06), 0 4px 16px rgba(16,18,20,.05);
    --shadow-lg:0 8px 30px rgba(16,18,20,.14);
    --grad:linear-gradient(135deg,#149A58 0%,#0C5C36 100%);
  }
  html[data-theme=dark]{
    --paper:#060709; --panel:#111318; --panel2:#0B0D11; --ink:#EAEDF1; --soft:#8C939E;
    --line:#23272F; --line2:#191C22; --gain:#4ADE80; --loss:#F87171; --brass:#D4B061;
    --accent:#4ADE80; --accent-ink:#06170D;
    --warnbg:#221D0F; --warn:#E0B45C; --chip:#1B1F26; --danger-bg:#2A1917;
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 6px 24px rgba(0,0,0,.35);
    --shadow-lg:0 12px 44px rgba(0,0,0,.65);
    --grad:linear-gradient(135deg,#25B36B 0%,#136A41 100%);
  }

  /* ---- Midnight Navy — classic finance; blue is structural only */
  html[data-palette=navy][data-theme=dark]{
    --paper:#030712; --panel:#0F1626; --panel2:#0A101C; --ink:#E5EAF3; --soft:#8494AC;
    --line:#1D2940; --line2:#162033; --gain:#3FCB8E; --loss:#F0736A; --brass:#D8B15E;
    --accent:#609CFA; --accent-ink:#06101F;
    --warnbg:#241F0F; --warn:#E0B45C; --chip:#172239; --danger-bg:#2E1B1D;
    --shadow:0 1px 2px rgba(0,0,0,.45), 0 6px 24px rgba(0,0,0,.35);
    --shadow-lg:0 12px 44px rgba(0,0,0,.6);
    --grad:linear-gradient(135deg,#3B72D9 0%,#1B3B78 100%);
  }
  html[data-palette=navy][data-theme=light]{
    --paper:#F4F6FA; --panel:#FFFFFF; --panel2:#EEF1F7; --ink:#111927; --soft:#5A6779;
    --line:#DCE2EC; --line2:#E9EDF4; --gain:#0F7A4E; --loss:#B23A28; --brass:#8A6B22;
    --accent:#2563C9; --accent-ink:#FFFFFF;
    --warnbg:#FDF4E5; --warn:#8A5A10; --chip:#E6EBF4; --danger-bg:#FBEBE8;
    --shadow:0 1px 2px rgba(17,25,39,.06), 0 4px 16px rgba(17,25,39,.05);
    --shadow-lg:0 8px 30px rgba(17,25,39,.14);
    --grad:linear-gradient(135deg,#2563C9 0%,#1B4694 100%);
  }

  /* ---- Spruce — the original: calm, natural green */
  html[data-palette=spruce][data-theme=dark]{
    --paper:#070C09; --panel:#101914; --panel2:#0B130F; --ink:#E6ECE7; --soft:#8FA096;
    --line:#24312A; --line2:#1A251F; --gain:#41C083; --loss:#E36A56; --brass:#CFAC5C;
    --accent:#41C083; --accent-ink:#06120B;
    --warnbg:#262012; --warn:#E2AC52; --chip:#1B2620; --danger-bg:#2F1E1A;
    --shadow:0 1px 2px rgba(0,0,0,.45), 0 6px 24px rgba(0,0,0,.3);
    --shadow-lg:0 12px 44px rgba(0,0,0,.55);
    --grad:linear-gradient(135deg,#2C9463 0%,#155741 100%);
  }
  html[data-palette=spruce][data-theme=light]{
    --paper:#F2F4F0; --panel:#FBFCFA; --panel2:#EFF2EC; --ink:#17251E; --soft:#5A6B62;
    --line:#D8DED8; --line2:#E7EBE6; --gain:#177A4A; --loss:#A93B2A; --brass:#8A6D2F;
    --accent:#177A4A; --accent-ink:#FFFFFF;
    --warnbg:#FDF3E7; --warn:#9A6212; --chip:#E7EBE6; --danger-bg:#FBEDEA;
    --shadow:0 1px 2px rgba(20,31,25,.06), 0 4px 16px rgba(20,31,25,.04);
    --shadow-lg:0 8px 30px rgba(20,31,25,.12);
    --grad:linear-gradient(135deg,#177A4A 0%,#0F5E43 100%);
  }

  /* ---- Ink Violet — premium, distinctive */
  html[data-palette=violet][data-theme=dark]{
    --paper:#0A0714; --panel:#151024; --panel2:#0F0B1C; --ink:#ECE8F6; --soft:#958BB0;
    --line:#292145; --line2:#1E1836; --gain:#54CC9A; --loss:#F0708C; --brass:#D6B15F;
    --accent:#A66CFF; --accent-ink:#0C0718;
    --warnbg:#251C11; --warn:#DFB05C; --chip:#1F1836; --danger-bg:#2E1723;
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 6px 24px rgba(0,0,0,.4);
    --shadow-lg:0 12px 44px rgba(0,0,0,.65);
    --grad:linear-gradient(135deg,#8250E0 0%,#4B2A8C 100%);
  }
  html[data-palette=violet][data-theme=light]{
    --paper:#F6F4FB; --panel:#FFFFFF; --panel2:#EFEBF7; --ink:#191426; --soft:#61587A;
    --line:#E1DCEC; --line2:#EBE7F3; --gain:#0F7A50; --loss:#B5354F; --brass:#836620;
    --accent:#6D3BC4; --accent-ink:#FFFFFF;
    --warnbg:#FBF3E4; --warn:#87590F; --chip:#EAE5F4; --danger-bg:#FAE9EE;
    --shadow:0 1px 2px rgba(25,20,38,.06), 0 4px 16px rgba(25,20,38,.05);
    --shadow-lg:0 8px 30px rgba(25,20,38,.14);
    --grad:linear-gradient(135deg,#6D3BC4 0%,#4A2589 100%);
  }

  *{box-sizing:border-box}
  html{-webkit-tap-highlight-color:transparent}
  body{margin:0;color:var(--ink);
    /* faint ambient accent glows behind the chrome — pre-computed gradients,
       no blur filters (repaint jank on some Android browsers) */
    background:
      radial-gradient(720px 360px at 86% -6%, color-mix(in srgb,var(--accent) 10%,transparent), transparent 70%),
      radial-gradient(620px 340px at -10% 22%, color-mix(in srgb,var(--accent) 6%,transparent), transparent 70%),
      var(--paper);
    background-attachment:fixed;
    font-family:var(--font);padding-bottom:calc(90px + env(safe-area-inset-bottom));
    font-variant-numeric:tabular-nums;
    transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
  ::selection{background:color-mix(in srgb,var(--accent) 30%,transparent)}
  .wrap{max-width:860px;margin:0 auto;padding:0 16px}
  h1{font-family:var(--display);font-weight:700;font-size:27px;
    margin:20px 0 2px;letter-spacing:-.03em;display:flex;align-items:center;gap:10px}
  h1::before{content:"";width:5px;height:23px;border-radius:99px;background:var(--grad);
    box-shadow:0 0 12px color-mix(in srgb,var(--accent) 45%,transparent);flex-shrink:0}
  .stamp{font-family:var(--font);font-variant-numeric:tabular-nums;font-size:10.5px;color:var(--soft);letter-spacing:.02em}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:16px;margin-top:14px;box-shadow:var(--shadow);
    transition:border-color .25s,box-shadow .25s,transform .25s cubic-bezier(.16,1,.3,1)}
  html[data-theme=dark] .panel{
    /* faint top sheen so dark cards read as layered surfaces, not flat holes */
    background:linear-gradient(180deg,color-mix(in srgb,var(--ink) 4%,var(--panel)) 0%,var(--panel) 72px)}
  .cards .panel:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);
    border-color:color-mix(in srgb,var(--accent) 30%,var(--line))}
  .label{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);
    margin-bottom:5px;font-weight:600}
  .mono{font-family:var(--font);font-variant-numeric:tabular-nums}
  .big{font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:-.02em}
  .gain{color:var(--gain)} .loss{color:var(--loss)} .brass{color:var(--brass)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:14px}
  .cards .panel{margin-top:0}
  /* hero stat — the first KPI card carries the palette gradient */
  .cards>.panel:first-child{background:var(--grad);border-color:transparent;
    box-shadow:0 10px 30px color-mix(in srgb,var(--accent) 22%,transparent)}
  .cards>.panel:first-child .label{color:rgba(255,255,255,.75)}
  .cards>.panel:first-child .big{color:#FFFFFF;
    text-shadow:0 1px 12px rgba(0,0,0,.18)}
  @media(min-width:520px){.cards>.panel:first-child{grid-column:span 2}}

  /* modern segmented tab bar */
  /* solid background instead of backdrop-filter: blur() causes repaint jank
     on some Android browsers when scrolling long event lists */
  .tabbar{position:sticky;top:0;z-index:8;margin:14px -16px 0;
    padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
    background:var(--paper);border-bottom:1px solid var(--line)}
  .tabs{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);
    border-radius:15px;padding:4px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{flex:1;min-width:max-content;display:flex;align-items:center;justify-content:center;
    gap:6px;font:600 13px var(--font);padding:10px 14px;border-radius:11px;cursor:pointer;
    border:none;background:transparent;color:var(--soft);white-space:nowrap;touch-action:manipulation;
    transition:color .2s,background .2s}
  .tabs button:hover{color:var(--ink)}
  .tabs button svg{width:16px;height:16px;stroke-width:2.2}
  .tabs button.on{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 28%,transparent);
    animation:tabpop .3s cubic-bezier(.16,1,.3,1)}
  @keyframes tabpop{from{transform:scale(.94);opacity:.7}}
  .menuwrap{position:relative}
  .menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--panel);
    border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);
    padding:6px;min-width:186px;z-index:20;display:none}
  .menu.open{display:block;transform-origin:top right;animation:menuIn .2s cubic-bezier(.16,1,.3,1)}
  .menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;
    font:600 13px var(--font);padding:10px 12px;border-radius:9px;border:none;background:transparent;
    color:var(--ink);cursor:pointer}
  .menu button{transition:background .15s}
  .menu button:hover,.menu button:active{background:var(--panel2)}
  .menu button.warn{color:var(--loss)}
  .menu button svg{width:15px;height:15px;stroke-width:2;flex-shrink:0}
  .menu .sep{height:1px;background:var(--line);margin:5px 4px}
  .menu .mhead{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);
    font-weight:600;padding:8px 12px 4px}
  .menu button.pal{gap:9px}
  .menu button.pal i{width:11px;height:11px;border-radius:50%;flex-shrink:0;
    box-shadow:0 0 0 1px var(--line)}
  .menu button.pal .tick{margin-left:auto;opacity:0;color:var(--accent);font-weight:700}
  .menu button.pal.on{color:var(--ink)}
  .menu button.pal.on .tick{opacity:1}

  button.btn{font:600 13px var(--font);padding:10px 16px;border-radius:12px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);touch-action:manipulation;
    transition:transform .18s cubic-bezier(.16,1,.3,1),background .2s,border-color .2s,box-shadow .2s,filter .2s}
  button.btn svg{width:14px;height:14px;stroke-width:2.2}
  button.btn:hover{border-color:color-mix(in srgb,var(--accent) 35%,var(--line));box-shadow:var(--shadow)}
  button.btn:active{transform:scale(.96);box-shadow:none}
  button.primary{border-color:transparent;color:var(--accent-ink);
    /* accent-hued sheen keeps the same contrast pair as the flat accent */
    background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 88%,#fff) 0%,var(--accent) 100%);
    box-shadow:0 2px 12px color-mix(in srgb,var(--accent) 32%,transparent)}
  button.primary:hover{filter:brightness(1.06);
    box-shadow:0 4px 18px color-mix(in srgb,var(--accent) 42%,transparent)}
  button.danger{background:var(--danger-bg);border-color:transparent;color:var(--loss)}
  button.small{font-size:12px;padding:8px 12px;border-radius:10px}
  button.icon{padding:9px 11px}
  button:disabled{opacity:.4;cursor:default}
  input,select{font:14px var(--font);padding:11px 12px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);width:100%;transition:border-color .2s,box-shadow .2s}
  input:focus,select:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
  input[type=number]{font-family:var(--font);font-variant-numeric:tabular-nums}
  input[type=datetime-local]{color-scheme:dark}
  html[data-theme=light] input[type=datetime-local]{color-scheme:light}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .row>label{flex:1;min-width:140px;display:block}
  .line{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:11px 0;border-bottom:1px solid var(--line2);font-size:13px;flex-wrap:wrap}
  .line:last-child{border-bottom:none}
  .tag{display:inline-block;white-space:nowrap;font:600 10px var(--font);border-radius:7px;
    padding:3px 7px;text-transform:uppercase;margin-right:8px;letter-spacing:.05em;vertical-align:middle;
    box-shadow:inset 0 0 0 1px color-mix(in srgb,currentColor 22%,transparent)}
  .tag.trade{background:var(--chip);color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent)}
  .tag.deposit{background:var(--chip);color:var(--gain);background:color-mix(in srgb,var(--gain) 15%,transparent)}
  .tag.withdrawal{background:var(--danger-bg);color:var(--loss)}
  .tag.exit{background:var(--chip);color:var(--soft)}
  .tag.join{background:var(--chip);color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent)}
  .tag.trash{background:var(--danger-bg);color:var(--loss)}
  .tag.restore{background:var(--chip);color:var(--gain);background:color-mix(in srgb,var(--gain) 15%,transparent)}
  .tag.member{background:var(--chip);color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent)}
  .tag.admin,.tag.other{background:var(--chip);color:var(--soft)}
  .tag.bonus{background:var(--chip);color:var(--brass);background:color-mix(in srgb,var(--brass) 18%,transparent)}
  .chip{font:600 12px var(--font);padding:7px 13px;border-radius:20px;cursor:pointer;
    border:1px solid var(--line);background:transparent;color:var(--soft);transition:all .15s}
  .chip:hover{border-color:color-mix(in srgb,var(--accent) 45%,var(--line));color:var(--ink)}
  .chip:active{transform:scale(.95)}
  .chip.on{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);
    border-color:color-mix(in srgb,var(--accent) 42%,transparent)}
  .dayhead{display:flex;justify-content:space-between;align-items:baseline;
    margin-top:18px;padding-bottom:6px;border-bottom:2px solid var(--line);
    font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--soft)}
  .warnbox{background:var(--warnbg);border-color:color-mix(in srgb,var(--warn) 40%,transparent)}
  .warnbox div{font-size:13px;color:var(--warn);margin-top:4px}
  .bar{height:8px;background:var(--line2);border-radius:5px;margin-top:6px;overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:5px;transition:width .6s cubic-bezier(.16,1,.3,1);
    background:linear-gradient(90deg,color-mix(in srgb,var(--gain) 70%,var(--accent)),var(--gain));
    box-shadow:0 0 10px color-mix(in srgb,var(--gain) 40%,transparent)}
  .dbl{margin-top:16px;padding:12px 0 0;border-top:2px solid var(--line);
    display:flex;justify-content:space-between;font-size:14px;font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
  /* mobile: stacked split rows — nothing clips, exact cents preserved */
  .srow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;
    padding:9px 0;border-bottom:1px solid var(--line2);flex-wrap:wrap}
  .srow:last-child{border-bottom:none}
  .sname{font-size:13px;font-weight:600;min-width:96px;flex:1}
  .sfig{font-family:var(--font);font-variant-numeric:tabular-nums;font-size:13px;text-align:right;
    white-space:nowrap}
  .sflow{font-family:var(--font);font-variant-numeric:tabular-nums;font-size:11.5px;color:var(--soft);
    white-space:nowrap;width:100%;text-align:right;margin-top:2px}
  .ssum{display:flex;justify-content:space-between;align-items:baseline;gap:10px;
    padding:10px 0 2px;margin-top:4px;border-top:2px solid var(--line);font-size:13px;font-weight:700}
  th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--soft);
    padding:6px;border-bottom:1px solid var(--line);font-weight:700}
  td{padding:9px 6px;border-bottom:1px solid var(--line2)}
  tr:last-child td{border-bottom:none}
  td.num{font-family:var(--font);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
  #toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:14px;font-size:13px;
    font-weight:500;max-width:90vw;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index:99;box-shadow:var(--shadow-lg)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  svg.spark{width:100%;height:64px;display:block;touch-action:pan-y}
  .sparkmeta{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--soft);
    margin-top:8px;font-variant-numeric:tabular-nums}
  .sparkmeta b{color:var(--ink);font-weight:600}
  .sparkmeta .spark-read{margin-left:auto;color:var(--accent);font-weight:600}
  .muted{font-size:13px;color:var(--soft)}
  .hint{font-size:12px;color:var(--soft);margin-top:6px;line-height:1.5}
  .kv{display:flex;gap:22px;flex-wrap:wrap;margin-top:10px}
  .kv>div{min-width:110px}
  .histbox{margin-top:12px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px}
  .formbox{margin-top:12px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px;
    animation:slideDown .2s ease}
  @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  #tabbody{animation:fadeIn .25s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  /* ---- motion layer (visual only) ---- */
  @keyframes menuIn{from{opacity:0;transform:scale(.92) translateY(-6px)}}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  /* stagger sections + KPI cards on every tab draw (30-50ms steps) */
  #tabbody>*{animation:rise .4s cubic-bezier(.16,1,.3,1) backwards}
  #tabbody>*:nth-child(2){animation-delay:.04s}
  #tabbody>*:nth-child(3){animation-delay:.08s}
  #tabbody>*:nth-child(4){animation-delay:.12s}
  #tabbody>*:nth-child(5){animation-delay:.16s}
  .cards>.panel{animation:rise .4s cubic-bezier(.16,1,.3,1) backwards}
  .cards>.panel:nth-child(2){animation-delay:.03s}
  .cards>.panel:nth-child(3){animation-delay:.06s}
  .cards>.panel:nth-child(4){animation-delay:.09s}
  .cards>.panel:nth-child(5){animation-delay:.12s}
  /* sparkline: line draws in, gradient area fades up under it */
  svg.spark path.lineDraw{stroke-width:2.25;stroke-linecap:round;stroke-linejoin:round;

/* presentational upgrade only: same inputs, same guard — adds a gradient

let sparkN = 0;
const SPARKS = {};   // gid -> {pts, labels, signed} for the pointer readout
function spark(pts, color, opts){
  if(!pts || pts.length<2) return `<div class="muted">Not enough history for a chart yet.</div>`;
  const o = opts||{};
  const w=560,h=56, vs=pts, min=Math.min(...vs), max=Math.max(...vs);
  const y=v=>max===min?h/2:h-((v-min)/(max-min))*(h-6)-3, x=i=>i/(pts.length-1)*w;
  const d=pts.map((v,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const c=color||'var(--gain)', gid="sparkg"+(++sparkN);   // unique per chart on the page
  SPARKS[gid]={pts, labels:o.labels||null, signed:!!o.signed};
  // prune registry entries whose charts have long left the DOM
  if(sparkN%100===0) for(const k in SPARKS) if(+k.slice(6) < sparkN-50) delete SPARKS[k];
  const last = pts[pts.length-1];
  const words = o.signed ? ["best","worst","last"] : ["high","low","now"];
  return `<svg class="spark" data-spark="${gid}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"
      role="img" aria-label="Chart. ${words[0]} ${fmt(max,o.signed)}, ${words[1]} ${fmt(min,o.signed)}, ${words[2]} ${fmt(last,o.signed)}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${c}" stop-opacity=".2"/>
      <stop offset="1" stop-color="${c}" stop-opacity="0"/></linearGradient></defs>
    <path class="area" d="${d} L${w},${h} L0,${h} Z" fill="url(#${gid})" stroke="none"/>
    <path class="lineDraw" pathLength="1" d="${d}" fill="none" stroke="${c}" stroke-width="2"/></svg>
  <div class="sparkmeta">
    <span>${words[0]} <b class="${o.signed?'gain':''}">${fmt(max,o.signed)}</b></span>
    <span>${words[1]} <b class="${o.signed&&min<0?'loss':''}">${fmt(min,o.signed)}</b></span>
    <span>${words[2]} <b>${fmt(last,o.signed)}</b></span>
    <span class="spark-read" id="read-${gid}"></span></div>`;
}
/* hover / touch-drag readout: nearest point's label + exact value */
document.addEventListener("pointermove", e=>{
  const svg = e.target.closest ? e.target.closest("svg.spark") : null;

  const S = SPARKS[svg.dataset.spark]; if(!S) return;
  const r = svg.getBoundingClientRect(); if(!r.width) return;
  const i = Math.max(0, Math.min(S.pts.length-1,
    Math.round((e.clientX-r.left)/r.width*(S.pts.length-1))));

/* round(a/b) half away from zero on exact BigInt integers — matches Postgres
   round(numeric). Math.round rounds -2.5 up to -2 and would put the preview
   one cent off the saved result on exact half-cent ties. */
const divRound = (a,b)=>{ const q=a/b, r=a%b, ar=r<0n?-r:r;
  return Number(2n*ar>=b ? q+(a<0n?-1n:1n) : q); };
/* same largest-remainder algorithm as Postgres — preview only; DB is canonical.
   BigInt throughout: Postgres computes with exact numerics, so the preview must
   too — floats could mis-order equal remainders or drift on very large pools. */
function allocate(totalC, weights, ids){
  const sumW = weights.reduce((a,b)=>a+b,0); if(sumW<=0) return weights.map(()=>0);
  const T = BigInt(totalC), S = BigInt(sumW);
  // Postgres truncates toward zero then distributes leftover by (frac desc, member_id);
  // fractions share the denominator sumW, so frac order = |remainder| order
  const base = [], frac = [];
  weights.forEach((w,i)=>{ const p = T*BigInt(w), r = p%S;
    base[i] = Number(p/S); frac[i] = r<0n ? -r : r; });
  let rem = totalC - base.reduce((a,b)=>a+b,0);
  const order = frac.map((f,i)=>({i, f, id: ids?String(ids[i]):String(i)}))
    .sort((a,b)=> a.f===b.f ? a.id.localeCompare(b.id) : (b.f>a.f ? 1 : -1));
  const step = rem>0?1:-1;
  for(let k=0; rem!==0; k=(k+1)%order.length){ base[order[k].i]+=step; rem-=step; }
  return base;
}

/* Faithful client-side replay — mirrors the Postgres recompute_pool exactly
   (same ordering rules, bonus carve-out, largest-remainder split). Used ONLY
   for the trade preview so what you see equals what saving produces. The
   database remains the single source of truth for saved balances. */
function replayEngine(members, events){
  const st = {};
  members.forEach(m=>st[m.id]={bal:0,contrib:0,joined:false,exited:false});
  let bonus = 0;
  const allocByEvent = {};
  const prioOf = t => t==="deposit"||t==="bonus"?1 : t==="trade"?2 : t==="withdrawal"?3 : 4;
  const tl = [];
  members.forEach(m=>tl.push({ot:m.joined_at, prio:0, ct:m.created_at||"", id:m.id, kind:"join", mid:m.id, amt:m.original_capital_c}));
  events.filter(e=>!e.deleted).forEach(e=>tl.push({
    ot:e.order_time, prio:prioOf(e.type), ct:e.created_at||"", id:e.id,
    kind:e.type, mid:e.member_id, amt:e.amount_c, pnl:e.pnl_c }));
  // sort on parsed epoch times — a preview event carries "…Z" timestamps while
  // DB rows carry "…+00:00"; string comparison would misorder identical instants
  tl.forEach(x=>{ x.otMs=Date.parse(x.ot); x.ctMs=x.ct?Date.parse(x.ct):0; });
  tl.sort((a,b)=> a.otMs!==b.otMs ? a.otMs-b.otMs
    : a.prio!==b.prio ? a.prio-b.prio
    : a.ctMs!==b.ctMs ? a.ctMs-b.ctMs
    : String(a.id).localeCompare(String(b.id)));
  for(const ev of tl){
    if(ev.kind==="join"){ const s=st[ev.mid]; if(s){s.joined=true;s.bal+=ev.amt;s.contrib+=ev.amt;} }
    else if(ev.kind==="trade"){
      const parts = members.filter(m=>st[m.id].joined && !st[m.id].exited && st[m.id].bal>0);
      const memberTotal = parts.reduce((a,m)=>a+st[m.id].bal,0);
      const total = memberTotal + bonus;
      if(total<=0){ allocByEvent[ev.id]={skipped:true}; continue; }
      const bonusShare = divRound(BigInt(ev.pnl)*BigInt(bonus), BigInt(total));
      const rem = ev.pnl - bonusShare;
      const shares = allocate(rem, parts.map(m=>st[m.id].bal), parts.map(m=>m.id));
      allocByEvent[ev.id] = {
        shares: parts.map((m,i)=>({id:m.id, before:st[m.id].bal, share:shares[i], after:st[m.id].bal+shares[i]})),
        bonusBefore:bonus, bonusShare, bonusAfter:bonus+bonusShare, pnl:ev.pnl };
      bonus += bonusShare;
      parts.forEach((m,i)=>st[m.id].bal+=shares[i]);
    }
    else if(ev.kind==="deposit"){ const s=st[ev.mid]; if(s){s.bal+=ev.amt;s.contrib+=ev.amt;} }
    else if(ev.kind==="withdrawal"){ const s=st[ev.mid]; if(s) s.bal-=ev.amt; }
    else if(ev.kind==="exit"){ const s=st[ev.mid]; if(s){s.payout=s.bal;s.realized=s.bal-s.contrib;s.bal=0;s.exited=true;} }
    else if(ev.kind==="bonus"){ bonus+=ev.amt; }
  }
  return {st, bonus, allocByEvent};
}

function initClient(){
  if (typeof window.supabase === "undefined") {
    app.innerHTML = `<div class="panel"><div class="label">Can't load Supabase library</div>
      The supabase-js script failed to load from the CDN. Check your internet connection
      (or an ad/script blocker) and reload.</div>`;
    return false;
  }
  if (SUPABASE_URL.startsWith("PASTE") || SUPABASE_ANON_KEY.startsWith("PASTE")) {
    app.innerHTML = `<div class="panel"><div class="label">Setup needed</div>
      Open this file in a text editor and paste your Supabase <b>Project URL</b> and
      <b>anon public key</b> into the CONFIG block at the top of the script
      (Supabase dashboard → Settings → API). Then reload this page.</div>`;
    return false;
  }
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    /* Session watchdog: if the refresh token expires (e.g. app left open
       overnight), queries would otherwise fail silently. Send the user cleanly
       back to login. INITIAL_SESSION / SIGNED_IN on load are ignored. */
    sb.auth.onAuthStateChange((evt, session)=>{
      /* User arrived via a password-reset email link — let them set the new
         password. Without this the reset flow is a dead end. */
      if(evt==="PASSWORD_RECOVERY") return renderNewPassword();
      if((evt==="SIGNED_OUT" || (evt==="TOKEN_REFRESHED" && !session)) && !sessionEnded){
        sessionEnded = true;
        app.innerHTML = `<h1>Pool Ledger</h1><div class="panel">
          Your session has expired. Please sign in again.
          <div style="margin-top:10px"><button class="btn primary" onclick="location.reload()">Sign in</button></div></div>`;
      }
    });
    return true;
  }
  catch (e) {
    app.innerHTML = `<div class="panel"><div class="label">Invalid configuration</div>
      Couldn't connect with the values in the CONFIG block: ${esc(e.message||e)}.
      The URL should look like <span class="mono">https://xxxx.supabase.co</span>.</div>`;
    return false;
  }
}
async function boot(){
  if(!initClient()) return;
  const { data:{ session } } = await sb.auth.getSession();
  if(!session) return renderLogin();
  const { data: isAdmin, error } = await sb.rpc("claim_admin");
  if(error) return err(error);
  if(isAdmin){ VIEW={kind:"admin"}; startRealtime(); return adminApp(); }
  const { data: mid } = await sb.rpc("link_member");
  if(mid){ VIEW={kind:"member", id:mid}; startRealtime(); return memberApp(mid); }
  app.innerHTML = `<h1>Pool Ledger</h1><div class="panel">
    Your login (${esc(session.user.email)}) isn't linked to a member yet.
    Ask the admin to add you as a member using this exact email, then reload.
    <div style="margin-top:10px"><button class="btn" onclick="signOut()">Sign out</button></div></div>`;
}
function renderLogin(){
  app.innerHTML = `<h1>Pool Ledger</h1><div class="stamp">v${VERSION}</div>
  <div class="panel" style="max-width:420px">
    <div class="label">Sign in</div>
    <div class="row" style="flex-direction:column;align-items:stretch">
      <label><div class="label">Email</div><input id="em" type="email" autocomplete="email"></label>
      <label><div class="label">Password</div><input id="pw" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></label>
      <button class="btn primary" onclick="doLogin()">Sign in</button>
      <button class="btn" onclick="toggleTheme()">${icon("theme")}Theme</button>
    </div>
    <div class="hint">Accounts are created by the admin — there is no public sign-up.
      Forgot your password? Ask the admin to reset it.</div>
  </div>`;
}
async function doLogin(){
  const { error } = await sb.auth.signInWithPassword({ email:$("#em").value.trim(), password:$("#pw").value });
  error ? err(error) : boot();
}
/* Self-service password reset is intentionally removed — the admin manages
   member passwords (Supabase dashboard → Authentication → Users → update
   password, or "Send password recovery"). The PASSWORD_RECOVERY handler
   below still catches admin-sent recovery links. */
function renderNewPassword(){
  app.innerHTML = `<h1>Pool Ledger</h1><div class="stamp">v${VERSION}</div>
  <div class="panel" style="max-width:420px">
    <div class="label">Choose a new password</div>
    <div class="row" style="flex-direction:column;align-items:stretch">
      <label><div class="label">New password</div><input id="pw1" type="password" autocomplete="new-password"></label>
      <label><div class="label">Repeat new password</div><input id="pw2" type="password" autocomplete="new-password" onkeydown="if(event.key==='Enter')saveNewPassword()"></label>
      <button class="btn primary" onclick="saveNewPassword()">Set password</button>
    </div></div>`;
}
async function saveNewPassword(){
  const p1=$("#pw1").value, p2=$("#pw2").value;
  if(p1.length<8) return toast("Use at least 8 characters.");
  if(p1!==p2) return toast("The two passwords don't match.");
  const { error } = await sb.auth.updateUser({ password:p1 });
  if(error) return err(error);
  toast("Password updated — signing you in");

/* Supabase/PostgREST caps every select at 1000 rows. Page through so a
   long-running ledger is never silently truncated — a capped events list
   would corrupt trade previews, undo, and backups without any warning. */
async function fetchAll(build){
  const PAGE = 1000, rows = [];
  for(let from = 0;; from += PAGE){
    const { data, error } = await build().range(from, from + PAGE - 1);
    if(error) return { data:null, error };
    rows.push(...data);
    if(data.length < PAGE) break;
  }
  return { data:rows, error:null };
}

/* ---- realtime sync (Supabase Realtime — included in the free tier) ----
   Admin listens to events + members. Each member listens to their OWN
   member_state row: recompute_pool touches it on every change, and RLS
   already scopes it to them, so trades they can't see still ping them.
   Debounced — one save bursts several table changes but redraws once. */
let rtChannel = null, rtTimer = null;
function rtKick(){
  clearTimeout(rtTimer);
  rtTimer = setTimeout(()=>{
    if(!VIEW || document.hidden || formIsOpen()) return;
    if(VIEW.kind==="admin") refresh(); else memberApp(VIEW.id);
  }, 600);
}
function startRealtime(){
  if(rtChannel || !sb || !VIEW) return;
  rtChannel = sb.channel("pool-sync");
  if(VIEW.kind==="admin"){
    rtChannel.on("postgres_changes",{event:"*",schema:"public",table:"events"},rtKick)
             .on("postgres_changes",{event:"*",schema:"public",table:"members"},rtKick);
  } else {
    rtChannel.on("postgres_changes",{event:"*",schema:"public",table:"member_state",
      filter:"member_id=eq."+VIEW.id},rtKick);
  }
  rtChannel.subscribe();
}

/* ---------- backup & restore ---------- */
async function backup(){
  const tables = ["members","events","trade_allocations","member_state","pool_state","pool_history","member_history","audit_log","replay_warnings"];
  const out = { exportedAt:new Date().toISOString(), version:VERSION };
  for(const t of tables){ const { data, error } = await fetchAll(()=>sb.from(t).select("*")); if(error) return err(error); out[t]=data; }
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:"application/json"}));
  a.download=`pool-ledger-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); toast("Backup downloaded");
  try{localStorage.setItem("pl-lastbackup", String(Date.now()));}catch(_){}
}
/* nudge shown in the header once the last backup on THIS device is stale */
function backupNote(){
  let t=null; try{t=+localStorage.getItem("pl-lastbackup")||null;}catch(_){}
  if(!t) return ` · <span style="color:var(--warn)">no backup yet</span>`;
  const d=Math.floor((Date.now()-t)/86400000);
  return d>=14 ? ` · <span style="color:var(--warn)">backup ${d}d old</span>` : "";
}
function pickRestore(){ $("#restore-file").onchange = onRestoreFile; $("#restore-file").click(); }
async function onRestoreFile(ev){
  const f = ev.target.files[0]; ev.target.value = "";
  if(!f) return;
  let d;
  try { d = JSON.parse(await f.text()); } catch(_) { return toast("That file isn't valid JSON."); }
  if(!Array.isArray(d.members) || !Array.isArray(d.events))
    return toast("This doesn't look like a Pool Ledger backup (missing members/events).");
  if(!confirm(`Restore backup from ${d.exportedAt ? fmtT(d.exportedAt) : "unknown date"}?\n\nThis REPLACES all ${A.members.length} current members and ${A.events.length} events with ${d.members.length} members and ${d.events.length} events from the file.`)) return;
  if(!confirm("Final confirmation — current data will be permanently replaced. Continue?")) return;
  const { data, error } = await sb.rpc("restore_backup", { payload: {
    members: d.members, events: d.events, audit_log: d.audit_log || [] } });
  if(error) return err(error);
  toast(data || "Backup restored"); refresh();
}

async function fetchMemberHistory(id){
  if(A.histCache[id]) return A.histCache[id];

    fetchAll(()=>sb.from("trade_allocations").select("id,order_time,share_c,balance_before_c,balance_after_c").eq("member_id",id).order("id")),
    fetchAll(()=>sb.from("events").select("*").eq("member_id",id).eq("deleted",false).order("order_time").order("created_at")),
  ]);
  if(al.error||tx.error){ err(al.error||tx.error); return null; }
  const m = A.members.find(x=>x.id===id), s = A.state[id]||{};
  const rows = assembleHistory(m, s, al.data, tx.data);
  A.histCache[id] = { rows, m, s };
  return A.histCache[id];
}
/* shared: render history rows grouped under local-day headers (newest day first).
   day figure = sum of trade-share amounts that day (gains only, not cash moves). */
function historyTableHTML(rows){
  if(!rows.length) return `<div class="muted">No history yet.</div>`;
  const groups = [];
  rows.forEach(r=>{
    const k = dayKey(r.t);
    let g = groups[groups.length-1];
    if(!g || g.key!==k){ g={ key:k, day:r.t, items:[] }; groups.push(g); }
    g.items.push(r);
  });
  return groups.map(g=>{
    const dayPnl = g.items.filter(r=>r.type==="trade share").reduce((a,r)=>a+r.amt,0);
    const hasTrade = g.items.some(r=>r.type==="trade share");
    return `<div class="dayhead"><span>${fmtDay(g.day)}</span>
      ${hasTrade?`<span class="mono ${dayPnl>=0?'gain':'loss'}" style="text-transform:none">day P&L ${fmt(dayPnl,true)}</span>`:""}</div>
    ${g.items.map(r=>{
      const tt=r.type.replace(" share","").replace("joined","deposit");
      const lbl=r.type==="trade share"?"trade":r.type;
      const note=r.type==="trade share"?"profit share":(r.note||"");
      const time=new Date(r.t).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
      return `<div class="srow">
        <span class="sname"><span class="tag ${tt}">${esc(lbl)}</span>
          <span class="muted" style="font-weight:400">${time}${note?" · "+esc(note):""}</span></span>
        <span class="sfig ${r.amt==null?'':r.amt>=0?'gain':'loss'}">${r.amt==null?"—":fmt(r.amt,true)}</span>
        ${r.after!=null?`<span class="sflow">balance ${fmt(r.after)}</span>`:""}
      </div>`;}).join("")}`;
  }).join("");
}
/* shared: filter a unified history by row type. "joined" (starting capital)
   files under Deposits — same money direction. Used by the admin's per-member
   dropdowns and the member page; chips with zero entries are hidden. */
const HIST_FILTERS = [["all","All"],["trade share","Trades"],["deposit","Deposits"],
                      ["withdrawal","Withdrawals"],["exit","Exits"]];
function histRowsFiltered(rows, f){
  if(f==="all") return rows;
  if(f==="deposit") return rows.filter(r=>r.type==="deposit"||r.type==="joined");
  return rows.filter(r=>r.type===f);
}
function histChipsHTML(rows, cur, onclickFor){
  const count = f => histRowsFiltered(rows, f).length;
  return HIST_FILTERS.filter(([f])=>f==="all"||count(f)>0).map(([f,label])=>
    `<button class="chip ${cur===f?'on':''}" aria-pressed="${cur===f}" onclick="${onclickFor(f)}">${label} (${count(f)})</button>`).join("");
}
/* shared: assemble a member's unified history rows from allocations + events.
   Used by admin dropdown, admin CSV, member page, and member CSV — all identical. */
function assembleHistory(m, s, allocRows, eventRows){
  const rows = [];
  rows.push({ t:m.joined_at, seq:-1, type:"joined", amt:m.original_capital_c, note:"Starting capital" });
  eventRows.forEach((e,i)=>{
    if(e.type==="deposit") rows.push({ t:e.order_time, seq:1e9+i, type:"deposit", amt:e.amount_c });
    if(e.type==="withdrawal") rows.push({ t:e.order_time, seq:1e9+i, type:"withdrawal", amt:-e.amount_c });
    if(e.type==="exit") rows.push({ t:e.order_time, seq:2e9+i, type:"exit", amt:s.payout_c!=null?-s.payout_c:null, note:"Full payout" });
  });
  allocRows.forEach(a=>rows.push({ t:a.order_time, seq:a.id, type:"trade share", amt:a.share_c, before:a.balance_before_c, after:a.balance_after_c }));
  // compare as epoch ms — joined_at, events and allocations can carry different
  // fractional-second precision, which silently misorders a string comparison
  rows.forEach(r=>r.tMs=Date.parse(r.t));
  rows.sort((a,b)=> a.tMs===b.tMs ? b.seq-a.seq : b.tMs-a.tMs);
  return rows;
}
function historyCSV(rows, name){
  const q = v => '"'+String(v??"").replace(/"/g,'""')+'"';
  const lines = ["occurred_utc,occurred_local,type,amount_usd,balance_after_usd,note"];
  rows.slice().reverse().forEach(r=>lines.push([
    q(r.t), q(fmtT(r.t)), q(r.type),
    r.amt==null?"":(r.amt/100).toFixed(2),
    r.after==null?"":(r.after/100).toFixed(2), q(r.note||"")].join(",")));
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/csv"}));
  const stamp = new Date().toISOString().slice(0,10);
  const safe = (name||"member").replace(/[^a-z0-9]+/gi,"-").replace(/^-|-$/g,"").toLowerCase() || "member";
  a.download = `${safe}-history-${stamp}.csv`; a.click();
  toast("CSV downloaded");
}
/* ---------- monthly statement (printable — use the browser's Save as PDF) ---------- */
function monthDefault(){
  // statements are usually for the completed month. setDate(1) first —
  // otherwise on the 29th-31st setMonth overflows short months (Mar 31 →
  // "Feb 31" → Mar 3) and defaults to the wrong month.
  const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-1);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}
/* replay the unified history oldest-first with a running balance, then slice
   out the requested month. Local-time months, like everything else on screen. */
function statementFor(rows, ym){
  const seq = rows.slice().reverse();                 // rows arrive newest-first
  let bal = 0, opening = 0;
  const items = [], totals = { deposits:0, withdrawals:0, trading:0, exit:0 };
  for(const r of seq){
    const k = dayKey(r.t).slice(0,7);
    if(k > ym) break;
    if(r.amt!=null) bal += r.amt;
    if(k < ym){ opening = bal; continue; }
    if(r.type==="deposit"||r.type==="joined") totals.deposits += r.amt||0;
    else if(r.type==="withdrawal") totals.withdrawals += r.amt||0;
    else if(r.type==="trade share") totals.trading += r.amt||0;
    else if(r.type==="exit") totals.exit += r.amt||0;
    items.push({ t:r.t, type:r.type, amt:r.amt, bal });
  }
  return { opening, closing: items.length ? items[items.length-1].bal : opening, totals, items };
}

/* ---------- screenshot import (on-device OCR — the image never leaves
   this device; Tesseract.js is lazy-loaded from the CDN on first use) ----- */
const BROKER_DATE_DMY = true;   // broker prints DD/MM/YYYY; flip if yours is MM/DD
let tessReady = null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(tessReady) return tessReady;
  tessReady = new Promise((res, rej)=>{
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload = res;
    s.onerror = ()=>{ tessReady=null; rej(new Error("Couldn't load the OCR library — check your connection and try again.")); };
    document.head.appendChild(s);
  });
  return tessReady;
}
function pickShot(){ const el=$("#shot-file"); el.onchange=onShotFile; el.click(); }
async function onShotFile(ev){
  const files = [...ev.target.files]; ev.target.value = "";
  if(!files.length) return;
  const box = $("#shot-box"); if(!box) return;
  box.innerHTML = `<div class="formbox"><div class="label">Reading ${files.length>1?files.length+" screenshots":"screenshot"}…</div>
    <div class="muted" id="shot-prog">Loading OCR engine (first use downloads ~3 MB, then cached)…</div></div>`;
  try{
    await loadTesseract();
    let all = [], failed = [];
    for(let k=0; k<files.length; k++){
      const tag = files.length>1 ? `Image ${k+1} of ${files.length} — ` : "";
      try{
        const { data } = await Tesseract.recognize(files[k], "eng", { logger: m=>{
          const el=$("#shot-prog");
          if(el && m.status==="recognizing text") el.textContent = tag + "reading… " + Math.round(m.progress*100) + "%";
        }});
        all = all.concat(parseBrokerText(data.text));
      }catch(_){ failed.push(files[k].name || ("image "+(k+1))); }   // one bad image never sinks the batch
    }
    if(failed.length === files.length){
      box.innerHTML = "";
      return err(new Error(files.length>1 ? "None of the images could be read — try clearer screenshots."
                                          : "That image couldn't be read — try a clearer screenshot."));
    }
    // overlapping screenshots show the same trade twice — keep one
    // (same settlement minute + same P&L)
    const seen = new Set();
    const uniq = all.filter(r=>{
      if(!r.iso || r.pnl==null) return true;               // unparsed rows stay for manual fixing
      const key = Math.round(Date.parse(r.iso)/60000) + "|" + r.pnl;
      if(seen.has(key)) return false;
      seen.add(key); return true;
    });
    uniq.sort((a,b)=>(Date.parse(b.iso||0)||0)-(Date.parse(a.iso||0)||0));  // newest first, like the broker
    renderShotReview(uniq, failed.length ? `Couldn't read ${failed.map(esc).join(", ")} — skipped; the rest are below.` : "");
  }catch(e){ if(box) box.innerHTML=""; err(e); }
}
/* local datetime-local value with seconds ("YYYY-MM-DDTHH:MM:SS") */
const localInput = d => { const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds()); };
/* Parse broker "Order Records" OCR text into trade rows. Anchors on the
   repeating field labels; tolerant of fullwidth colons, dash variants and
   missing lines. Every value is shown for review before anything is saved. */
function parseBrokerText(text){
  const norm = String(text).replace(/：/g,":").replace(/[–—−]/g,"-").replace(/＋/g,"+");
  const lines = norm.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const out = []; let cur = {};
  const flush = ()=>{
    if(cur.pnl!=null && !isNaN(cur.pnl) && cur.pnl!==0){
      if(cur.won===false && cur.pnl>0) cur.pnl = -cur.pnl;  // "Lost" rows sometimes omit the minus
      const d = shotDate(cur);
      if(d){ cur.iso = d.toISOString(); cur.local = localInput(d); }
      out.push(cur);
    }
    cur = {};
  };
  for(const ln of lines){
    let m;
    if((m = ln.match(/\b(PUT|CALL)\b/i))){
      if(cur.pnl!=null) flush();               // a new block began without a Status line
      cur.dir = cur.dir || m[1].toUpperCase();
    }
    if((m = ln.match(/\(\s*(\d{1,2}:\d{2}(?::\d{2})?)\s*-\s*(\d{1,2}:\d{2}(?::\d{2})?)\s*\)/)))
      cur.cycleEnd = m[2];                     // settlement moment — drives order_time
    if((m = ln.match(/Profit\s*and\s*Loss\s*:?\s*([+-]?\s*[\d,]+(?:\.\d+)?)/i)))
      cur.pnl = toC(shotNum(m[1]));
    if((m = ln.match(/Order\s*Time\s*:?\s*(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})[ ,]*(\d{1,2}:\d{2}(?::\d{2})?)?/i))){
      cur.day=+m[1]; cur.mon=+m[2]; cur.year=+m[3]; cur.orderTime=m[4]||null;
      if(!BROKER_DATE_DMY){ const t=cur.day; cur.day=cur.mon; cur.mon=t; }
    }
    if(/Status\s*:?\s*(Won|Win)\b/i.test(ln)){ cur.won=true; flush(); }
    else if(/Status\s*:?\s*(Los[st]\w*|Lose)\b/i.test(ln)){ cur.won=false; flush(); }
  }
  flush();
  return out;
}
/* OCR digits: "1,234.56" (thousands separator) passes through; a lone ",dd"
   tail is a misread decimal point — "203,28" means 203.28, not 20,328 */
function shotNum(s){
  s = String(s).replace(/[+\s]/g,"");
  if(/,\d{1,2}$/.test(s) && !s.includes(".")) s = s.replace(/,(\d{1,2})$/, ".$1");
  return s;
}
function shotDate(c){
  if(!c.year || !c.mon || !c.day) return null;
  // reject OCR-misread dates outright instead of letting JS roll them over
  // (day 32 would silently become the 1st of the next month)
  if(c.mon<1 || c.mon>12 || c.day<1 || c.day>31) return null;
  const t = c.cycleEnd || c.orderTime || "12:00";
  const p = t.split(":").map(Number);
  const d = new Date(c.year, c.mon-1, c.day, p[0], p[1]||0, p[2]||0);
  if(isNaN(d.getTime())) return null;
  if(d.getDate()!==c.day || d.getMonth()!==c.mon-1) return null;   // e.g. 31/02
  // a cycle that settles just past midnight belongs to the next day
  if(c.cycleEnd && c.orderTime){
    const o=c.orderTime.split(":").map(Number), e=c.cycleEnd.split(":").map(Number);
    if(e[0]*60+e[1] < o[0]*60+o[1]-2) d.setDate(d.getDate()+1);
  }
  return d;
}
let shotTrades = [];   // model behind the review UI — lets a partial save resume safely

async function saveShotTrades(ev){
  // sync any manual edits from the inputs back into the model first
  document.querySelectorAll("#shot-box [data-shot]").forEach(r=>{
    const i = +r.dataset.shot, tr = shotTrades[i]; if(!tr) return;
    tr.pnl = toC($("#shot-p-"+i).value);
    tr.local = $("#shot-t-"+i).value;
    tr.iso = isoFrom(tr.local);
    tr.checked = !!$("#shot-c-"+i)?.checked;
  });
  const picks = shotTrades.map((t,i)=>({ ...t, i })).filter(t=>t.checked);
  for(const p of picks){
    if(!p.pnl || isNaN(p.pnl)) return toast(`Row ${p.i+1}: P&L must be a non-zero amount.`);
    if(!p.iso) return toast(`Row ${p.i+1}: pick a valid date and time.`);
  }
  if(!picks.length) return toast("Nothing is ticked — select at least one trade.");
  if(!confirm(`Save ${picks.length} trade${picks.length>1?"s":""} to the ledger?`)) return;
  picks.sort((a,b)=>Date.parse(a.iso)-Date.parse(b.iso));   // insert oldest-first
  await once(ev, async ()=>{
    const savedIdx = new Set();
    for(const p of picks){
      const { error } = await sb.from("events").insert({ type:"trade", pnl_c:p.pnl, order_time:p.iso });
      if(error){ err(error); break; }
      savedIdx.add(p.i);
    }
    const allSaved = savedIdx.size === picks.length;
    if(savedIdx.size) toast(allSaved
      ? `Imported ${savedIdx.size} trade${savedIdx.size>1?"s":""}`
      : `Imported ${savedIdx.size} of ${picks.length} — the rest stayed in the list to retry`);
    // saved rows leave the model so a retry can never insert them twice
    shotTrades = allSaved ? [] : shotTrades.filter((_,i)=>!savedIdx.has(i));
    await refresh();                       // redraw wipes #shot-box…
    if(shotTrades.length) renderShotReview(shotTrades);   // …restore the unsaved remainder
  });
}

/* ---------- trades tab ---------- */
function vTrades(){
  const filters = ["all","trade","join","deposit","withdrawal","exit","bonus"];
  // member joins are not rows in the events table — synthesize them into the
  // timeline so the history reads as one complete story (join shows the
  // initial capital; it can't be trashed because it IS the member record)
  const joins = A.members.map(m=>({ id:"join-"+m.id, type:"join", synthetic:true,
    order_time:m.joined_at, created_at:m.created_at||m.joined_at,
    member_id:m.id, amount_c:m.original_capital_c, deleted:false }));
  const all = [...A.events, ...joins];
  const countOf = f => all.filter(e=>!e.deleted && (f==="all"||e.type===f)).length;
  const live = all.filter(e=>!e.deleted && (A.filter==="all"||e.type===A.filter))
    .sort((a,b)=> (Date.parse(b.order_time)-Date.parse(a.order_time))
      || (Date.parse(b.created_at||0)-Date.parse(a.created_at||0)));
  const trash = A.events.filter(e=>e.deleted);
  const nameOf = id => A.members.find(m=>m.id===id)?.name || "—";
  // exits store no amount on the event — the payout lives in member_state
  const exitAmt = e => { const p=A.state[e.member_id]?.payout_c; return p==null?null:-p; };
  // render newest N only (huge innerHTML redraws get slow past ~1k events),
  // but always finish the cut day so per-day nets stay exact
  const visible = live.slice(0, A.showEvents);
  if(visible.length < live.length){
    const cutDay = dayKey(visible[visible.length-1].order_time);
    for(let i=visible.length; i<live.length && dayKey(live[i].order_time)===cutDay; i++)
      visible.push(live[i]);
  }
  const hidden = live.length - visible.length;
  // group by local day

      ${g.items.map(e=>{
        const v = e.type==="trade" ? e.pnl_c : e.type==="withdrawal" ? -e.amount_c
                : e.type==="exit" ? exitAmt(e) : e.amount_c;
        const sign = e.type==="trade"||e.type==="bonus";

          <div style="display:flex;gap:8px;align-items:center">
            <span class="mono ${sign?(v>=0?'gain':'loss'):(e.type==="withdrawal"||e.type==="exit")&&v!=null?'loss':''}">${fmt(v,sign)}</span>
            ${e.synthetic?"":`<button class="btn small danger" onclick="event.stopPropagation();trashEvent('${e.id}')">Trash</button>`}
          </div></div>
          <div id="alloc-${e.id}"></div>`;
      }).join("")}`;
    }).join("") : `<div class="muted" style="margin-top:10px">No ${A.filter==="all"?"":A.filter+" "}events yet.</div>`}
    ${hidden>0?`<div style="margin-top:14px;text-align:center">
      <button class="btn small" onclick="A.showEvents+=300;drawAdmin()">Show older events (${hidden} hidden)</button></div>`:""}
  </div>
  ${trash.length?`<div class="panel"><div class="label">Trash — restore, or delete forever</div>
    ${trash.map(e=>{
      const tv = e.type==="trade" ? e.pnl_c : e.type==="withdrawal" ? -e.amount_c : e.amount_c;
      return `<div class="line"><span class="muted">${e.type} · ${fmtT(e.order_time)} · ${e.type==="exit"?"full payout":fmt(tv, e.type!=="deposit")}</span>
      <span style="display:flex;gap:6px">
        <button class="btn small" onclick="restoreEvent('${e.id}')">Restore</button>
        <button class="btn small danger" onclick="deleteForever('${e.id}',event)">Delete</button>
      </span></div>`;}).join("")}</div>`:""}`;
}
async function deleteForever(id, ev){
  const e = A.events.find(x=>x.id===id);
  const nameOf = mid => (A.members.find(m=>m.id===mid)||{}).name || "";
  const what = e ? `${e.type}${e.member_id?" — "+nameOf(e.member_id):""} · ${fmtT(e.order_time)}` : "this event";
  if(!confirm(`Permanently delete ${what}?\n\nUnlike Trash, this removes the event from the database and it can never be restored. Balances stay as-is because a trashed event is already out of the replay.`)) return;
  if(!confirm("Final confirmation — delete forever?")) return;
  await once(ev, async ()=>{
    const { error } = await sb.from("events").delete().eq("id",id);
    if(error) return err(error);
    toast("Event permanently deleted"); await refresh();
  });
}
async function previewTrade(){
  const pnl = toC($("#tr-pnl").value);
  if(isNaN(pnl)||pnl===0) return toast("Enter a non-zero P&L (negative for a loss).");
  const t = isoFrom($("#tr-when").value);
  if(!t) return toast("Pick a valid trade date and time.");
  const P = A.pool||{active_pool_c:0,bonus_c:0};
  if(P.active_pool_c + P.bonus_c <= 0) return toast("Pool is at $0 — trades are blocked until fresh capital exists.");
  const warns = [];
  // Date.parse both sides — the input produces "…Z" but Postgres returns
  // "…+00:00", so string equality/ordering silently fails
  const tMs = Date.parse(t);
  // fuzzy: a screenshot import settles at :59 while manual entry types :00 —
  // same P&L within a minute is almost certainly the same trade
  const dupE = A.events.find(e=>!e.deleted&&e.type==="trade"&&e.pnl_c===pnl
    &&Math.abs(Date.parse(e.order_time)-tMs)<60000);
  if(dupE) warns.push(`Possible duplicate: a trade with this exact P&L already exists at ${fmtT(dupE.order_time)}.`);
  if(tMs>Date.now()) warns.push("This trade is dated in the future.");
  const earliest = A.members.reduce((a,m)=>!a||Date.parse(m.joined_at)<a?Date.parse(m.joined_at):a,null);
  if(earliest!=null && tMs<earliest) warns.push("This trade predates every member's join date — no one will share in it.");
  // TRUE replay: insert the proposed trade at its real chronological position
  // and read its actual split — identical to what the database will compute.
  const proposed = { id:"__preview__", type:"trade", order_time:t,
    created_at:new Date().toISOString(), pnl_c:pnl, deleted:false, member_id:null, amount_c:null };
  const R = replayEngine(A.members, [...A.events, proposed]);
  const alloc = R.allocByEvent["__preview__"];
  if(!alloc || alloc.skipped){
    $("#tr-preview").innerHTML = `<div class="formbox"><div class="label">Preview</div>
      <div style="color:var(--warn)">At this trade's point in time the pool was $0, so it can't be split. Add capital dated before this trade first.</div>
      <div style="margin-top:10px"><button class="btn" onclick="$('#tr-preview').innerHTML=''">Discard</button></div></div>`;
    return;
  }
  const nameOf = id => A.members.find(m=>m.id===id)?.name || "member";
  // helpful note when a bonus exists now but this trade lands before it
  if(P.bonus_c>0 && alloc.bonusBefore===0)
    warns.push("This trade is dated before your bonus was added, so the bonus does not share in it. Give the bonus an earlier time (or this trade a later one) if you want it included.");
  const sumShares = alloc.shares.reduce((a,s)=>a+s.share,0) + alloc.bonusShare;
  const poolBefore = alloc.shares.reduce((a,s)=>a+s.before,0) + alloc.bonusBefore;
  // sanity check: catch a mistyped extra zero before it hits the ledger
  if(poolBefore>0 && Math.abs(pnl) >= poolBefore)
    warns.push(`This trade is ${(100*Math.abs(pnl)/poolBefore).toFixed(0)}% of the pool at that moment (${fmt(poolBefore)}). Double-check the amount for a typo.`);
  const splitRows = [
    ...alloc.shares.map(sh=>({name:nameOf(sh.id), before:sh.before, share:sh.share, after:sh.after})),
    {name:"Bonus (admin)", bonus:true, before:alloc.bonusBefore, share:alloc.bonusShare, after:alloc.bonusAfter},
  ];
  $("#tr-preview").innerHTML = `<div class="formbox">
    <div class="label">Projected split — exactly what saving will produce (replayed in true time order)</div>
    ${warns.map(w=>`<div style="font-size:12px;color:var(--warn);margin-bottom:3px">⚠ ${esc(w)}</div>`).join("")}
    ${splitRowsHTML(splitRows, sumShares, pnl)}
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn primary" onclick="saveTrade(${pnl},'${t}',event)">Save trade</button>
      <button class="btn" onclick="$('#tr-preview').innerHTML=''">Discard</button></div></div>`;
}
/* Shared renderer for a trade's per-participant split.
   Stacked rows: name + share on line 1, "before → after" on line 2.
   Nothing clips at any number size; exact cents always shown. */
function splitRowsHTML(rows, sumC, pnlC){
  const bal = (sumC===pnlC);
  // participants + the bonus row together hold the whole pool at that moment,
  // so their before/after sums ARE the pool total (incl. bonus) — exact cents
  const poolBefore = rows.reduce((a,r)=>a+r.before,0);
  const poolAfter  = rows.reduce((a,r)=>a+r.after,0);
  return `<div style="margin-top:8px">
    ${rows.map(r=>`<div class="srow">
      <span class="sname ${r.bonus?'brass':''}">${esc(r.name)}${r.bonus?' <span class="muted" style="font-weight:400">· carved out first</span>':''}</span>
      <span class="sfig ${r.share>=0?'gain':'loss'}">${fmt(r.share,true)}</span>
      <span class="sflow">${fmt(r.before)} &nbsp;→&nbsp; ${fmt(r.after)}</span>
    </div>`).join("")}
    <div class="ssum"><span>Sum of shares</span>
      <span class="sfig ${bal?'':'loss'}">${fmt(sumC,true)}${bal?"":" ⚠ does not match trade"}</span></div>
    <div class="ssum" style="border-top:none;padding-top:2px">
      <span class="muted" style="font-weight:600">Pool total incl. bonus</span>
      <span class="sfig">${fmt(poolBefore)} &nbsp;→&nbsp; <b>${fmt(poolAfter)}</b></span></div>
  </div>`;
}
async function saveTrade(pnl, t, ev){
  await once(ev, async ()=>{
    const { error } = await sb.from("events").insert({ type:"trade", pnl_c:pnl, order_time:t });
    if(error) return err(error);
    const box=$("#tr-preview"); if(box) box.innerHTML="";   // prevent re-saving the same preview
    toast(`Trade ${fmt(pnl,true)} saved`); await refresh();
  });
}
async function toggleAlloc(eid){
  const box = $("#alloc-"+eid);
  if(box.innerHTML){ box.innerHTML=""; return; }
  const { data, error } = await sb.from("trade_allocations").select("*").eq("event_id",eid).order("share_c",{ascending:false});
  if(error) return err(error);
  const nameOf = id => id===null ? "Bonus (admin)" : (A.members.find(m=>m.id===id)?.name || "removed member");
  const rows = data.map(a=>({ name:nameOf(a.member_id), bonus:a.member_id===null,
    before:a.balance_before_c, share:a.share_c, after:a.balance_after_c }));
  const sum = data.reduce((s,a)=>s+a.share_c,0);
  const pnl = (A.events.find(e=>e.id===eid)||{}).pnl_c;

async function trashEvent(id, skipConfirm){
  if(!skipConfirm && !confirm("Move this event to the trash? It leaves the replay but can be restored at any time.")) return;
  await once(null, async ()=>{
    const { error } = await sb.from("events").update({ deleted:true }).eq("id",id);
    if(error) return err(error);
    toast("Event trashed"); await refresh();
  });
}
async function restoreEvent(id){
  await once(null, async ()=>{
    const { error } = await sb.from("events").update({ deleted:false }).eq("id",id);
    if(error) return err(error);
    toast("Event restored"); await refresh();
  });
}
async function undoLast(){
  // compare as real timestamps — string compare breaks when Postgres returns
  // differing fractional-second precision (.1+00:00 vs .123456+00:00)
  const last = A.events.filter(e=>!e.deleted)
    .sort((a,b)=> new Date(b.created_at) - new Date(a.created_at))[0];
  if(!last) return toast("Nothing to undo.");
  const nameOf = id => (A.members.find(m=>m.id===id)||{}).name || "member";
  // describe each type honestly: withdrawals remove money; exits carry no amount
  let desc;
  if(last.type==="trade")           desc = `Trade ${fmt(last.pnl_c,true)}`;
  else if(last.type==="withdrawal") desc = `Withdrawal ${fmt(-last.amount_c,true)} — ${nameOf(last.member_id)}`;
  else if(last.type==="deposit")    desc = `Deposit ${fmt(last.amount_c,true)} — ${nameOf(last.member_id)}`;
  else if(last.type==="bonus")      desc = `Bonus ${fmt(last.amount_c,true)}`;
  else if(last.type==="exit")       desc = `Exit — ${nameOf(last.member_id)} (full payout)`;
  else                              desc = last.type;
  if(!confirm(`Undo the most recently entered event?\n\n${desc}\n${fmtT(last.order_time)}\n\nIt moves to the trash and can be restored.`)) return;
  trashEvent(last.id, true);   // already confirmed above — don't ask twice
}

/* classify an audit entry by keywords in its action text.
   trash / restore are checked FIRST so "Trashed withdrawal …" files under
   Trash (the action taken) rather than Withdrawal (the thing acted on). */
function auditKind(action){
  const s = String(action).toLowerCase();
  if(/\btrash/.test(s) || /\bdelet/.test(s) || /\bpurge/.test(s)) return "trash";
  if(/\brestor/.test(s) || /\brecover/.test(s) || /\bundo/.test(s)) return "restore";
  if(/\bwithdr/.test(s))                          return "withdrawal";
  if(/\bdeposit/.test(s))                         return "deposit";
  if(/\bexit/.test(s))                            return "exit";
  if(/\bbonus/.test(s))                           return "bonus";
  if(/\btrade/.test(s))                           return "trade";
  if(/\bmember\b|\badded\b|\bjoin/.test(s))       return "member";
  if(/\badmin\b|\bbackup\b|\bcapital\b/.test(s))  return "admin";
  return "other";
}
function vAudit(){
  const KINDS = [
    ["all","All"],["trade","Trades"],["deposit","Deposits"],["withdrawal","Withdrawals"],
    ["exit","Exits"],["bonus","Bonus"],["member","Members"],["trash","Trash"],
    ["restore","Restores"],["admin","Admin"],["other","Other"]];
  const tagged = A.audit.map(a=>({ ...a, kind:auditKind(a.action) }));
  const countOf = k => k==="all" ? tagged.length : tagged.filter(a=>a.kind===k).length;
  if(A.auditFilter!=="all" && countOf(A.auditFilter)===0) A.auditFilter="all";
  const shown = tagged.filter(a=>A.auditFilter==="all"||a.kind===A.auditFilter);
  // group by local day (entries already arrive newest-first)
  const groups = [];
  shown.forEach(a=>{
    const k = dayKey(a.t);
    let g = groups[groups.length-1];
    if(!g || g.key!==k){ g={ key:k, day:a.t, items:[] }; groups.push(g); }
    g.items.push(a);
  });
  return `<div class="panel"><div class="label">Audit log — append-only, entries cannot be edited or deleted (by anyone)</div>
  <div class="hint">Left column: when the action was entered. Times inside the action text are when the event occurred — both shown in your local time. Showing the most recent 300 entries.</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
    ${KINDS.filter(([k])=>k==="all"||countOf(k)>0).map(([k,label])=>
      `<button class="chip ${A.auditFilter===k?'on':''}" aria-pressed="${A.auditFilter===k}" onclick="A.auditFilter='${k}';drawAdmin()">${label} (${countOf(k)})</button>`).join("")}
  </div>
  ${groups.length? groups.map(g=>`
    <div class="dayhead"><span>${fmtDay(g.day)}</span><span style="text-transform:none">${g.items.length} entr${g.items.length===1?"y":"ies"}</span></div>
    ${g.items.map(a=>`<div class="line">
      <span class="mono" style="color:var(--soft);white-space:nowrap">${new Date(a.t).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</span>
      <span class="tag ${a.kind}" style="margin-right:0">${a.kind}</span>
      <span style="flex:1">${esc(localizeAction(a.action))}</span></div>`).join("")}`).join("")
  : `<div class="muted" style="margin-top:10px">${A.audit.length?"No entries match this filter.":"Actions will be recorded here."}</div>`}</div>`;
}

    <div id="mem-hist" style="margin-top:10px">${historyTableHTML(memRowsFiltered())}</div>
  </div>`;
}
function exportMyHistory(){ if(MEM) historyCSV(MEM.rows, MEM.name); }

boot();
</script>
